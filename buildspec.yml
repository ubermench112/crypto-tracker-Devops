version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo Installing dependencies
      - pip install --upgrade pip
      - pip install -r lambda/api/requirements.txt -t lambda/api/
      - pip install -r lambda/collector/requirements.txt -t lambda/collector/
  build:
    commands:
      - echo Zipping Lambda functions
      - cd lambda/api && zip -r ../../api.zip * && cd ../../
      - cd lambda/collector && zip -r ../../collector.zip * && cd ../../
      - echo Build completed
artifacts:
  files:
    - api.zip
    - collector.zip
    - infrastructure/template.yaml