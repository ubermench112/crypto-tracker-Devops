AWSTemplateFormatVersion: '2010-09-09'
Description: Crypto Tracker Infrastructure

#  NEW: Parameter to force updates (add this block)
Parameters:
  BuildId:
    Type: String
    Description: Unique identifier for this build – passed by CodePipeline

Resources:

  # DynamoDB Table (unchanged)
  CryptoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CryptoPriceTracker
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: crypto_name
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: crypto_name
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  # Lambda Execution Role (unchanged)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: crypto-tracker-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: "*"

  # Collector Lambda (only change: added environment variable)
  CollectorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: crypto-price-collector
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        S3Bucket: crypto-tracker-lambda-code   # ← your bucket (unchanged)
        S3Key: collector.zip                    # ← your key (unchanged)
      Environment:                               #  NEW block
        Variables:
          BUILD_ID: !Ref BuildId

  # API Lambda (only change: added environment variable)
  ApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: crypto-price-api
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        S3Bucket: crypto-tracker-lambda-code   # ← your bucket (unchanged)
        S3Key: api.zip                          # ← your key (unchanged)
      Environment:                               #  NEW block
        Variables:
          BUILD_ID: !Ref BuildId
              